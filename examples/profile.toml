# ============================================================
# scsh 部署蓝图 Profile 示例
# 文件名: profile.toml
# 用途: 供 `deploy provision` 和 `deploy plan` 命令使用
# 说明: 定义卡片目标状态，scsh 会自动计算差异并执行部署
# ============================================================


[profile.meta]
# Profile 名称 (用于日志输出)
name = "FIDO2 智能卡部署蓝图"

# Profile 版本
version = "1.0"

# 目标卡片类型 (仅作注释，不影响执行)
target_card = "NXP SmartMX2 / JCOP v4"

# 作者
author = "decardlabs"

# 创建日期
date = "2026-06-18"


# ============================================================
# 需要部署的 Package / Applet 列表
# 每个 [[profile.packages]] 块定义一个要安装的 CAP 包
# ============================================================

# --- 示例 1: HelloWorld Applet (最简单的 Applet) ---
[[profile.packages]]
# Package/Applet AID (十六进制，奇数位会自动补0)
aid     = "A000000001000001"
# CAP 文件路径 (相对于项目根目录，也支持绝对路径)
cap     = "build/libs/HelloWorld.cap"
# 是否为默认选中 Applet (上电后自动 SELECT，默认 false)
default = true
# 安装参数 (TLV 格式，十六进制，可选)
# params  = "00C10101"
# Applet 权限位 (十六进制，可选，参考 JavaCard 规范)
# privs   = "02"
# 描述 (仅作注释)
description = "示例 HelloWorld Applet，用于功能验证"


# --- 示例 2: FIDO2 Applet (实际项目) ---
[[profile.packages]]
aid     = "A000000002000001"
cap     = "build/libs/FIDO2Applet.cap"
# 带安装参数: C9=01(Applet 参数), 01=长度, 01=值
params  = "00C90101"
# 权限: 02 = CSA_PRIV(可选，视具体需求)
privs   = "02"
default = false
description = "FIDO2 认证 Applet，支持 U2F 和 FIDO2 协议"


# --- 示例 3: 依赖库 (仅加载，不安装 Applet) ---
[[profile.packages]]
aid     = "A000000005000001"
cap     = "build/libs/CryptoLib.cap"
# 此包仅提供库函数，不设为默认 Applet
default = false
description = "密码学工具库 (AES/RSA/ECKey)"


# ============================================================
# 依赖声明 (可选)
# 声明此 Profile 依赖的、但不由此 Profile 安装的包
# 用于 deploy plan 时检查依赖是否满足
# ============================================================
[[profile.dependencies]]
aid = "A000000051000000"
description = "JavaCard 平台基础包 (卡片自带，无需安装)"

[[profile.dependencies]]
aid = "A000000051000002"
description = "JavaCard 安全库 (卡片自带，无需安装)"


# ============================================================
# 部署后操作 (可选，未来扩展)
# ============================================================
# [[profile.post_install]]
# action = "set-default"
# aid    = "A000000002000001"

# [[profile.post_install]]
# action = "store-data"
# data   = "00010203"


# ============================================================
# 使用说明
# ============================================================
# 1. 预览部署计划 (不执行):
#    >>> deploy plan
#
# 2. 执行部署:
#    >>> deploy provision
#
# 3. 分步执行 (每步暂停确认):
#    >>> deploy provision --step
#
# 4. 仅预览不执行:
#    >>> deploy provision --dry-run
#
# 输出示例:
#   Plan (3 actions):
#     [1/3] INSTALL A000000001000001 from build/libs/HelloWorld.cap
#     [2/3] INSTALL A000000002000001 from build/libs/FIDO2Applet.cap
#     [3/3] SET DEFAULT A000000001000001
